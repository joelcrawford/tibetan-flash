server {
    listen 80;
    listen [::]:80;
    server_name tibetan.havehopeyo.com;

    root /var/www/tibetan-flash;
    index index.html;

    # ── Static React app ──────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── TTS API → Node server ─────────────────────────────────
    location /speak {
        proxy_pass         http://127.0.0.1:7860;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;

        # TTS can take a few seconds — give it room
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}
